const APP_VERSION = "HD System v.2026.06.21-00:00";
const GOOGLE_CLIENT_ID = "812643310192-q7mkulm7tlqdm2q6q9nqnv6nivso2o6h.apps.googleusercontent.com";
const GOOGLE_DRIVE_FOLDER_ID = "1ZI9kBBzsgIE4Ncdlp70Mclm__32yYIxN";
const DRIVE_SCOPE = "https://www.googleapis.com/auth/drive.file";

// ── STORAGE ──
const DB_KEY="happyDino_v1";
const loadDB=()=>{try{return JSON.parse(localStorage.getItem(DB_KEY)||"{}");}catch{return{};}};
const saveDB=(db)=>localStorage.setItem(DB_KEY,JSON.stringify(db));
const initialDB={
  settings:{companyName:"Happy Dino Xperience Camp",logo:"",address:"",tin:"",phone:"",email:""},
  users:[
    {id:"u1",name:"Admin",loginId:"admin",role:"admin",password:"@555*123"},
    {id:"u2",name:"Finance",loginId:"finance",role:"finance",password:"@555*$*"},
    {id:"u3",name:"User",loginId:"user",role:"user",password:"@123*"}
  ],
  schools:[],students:[],campTypes:[],sessions:[],registrations:[],crew:[],crewAssignments:[],payments:[],expenses:[],inventory:[],communications:[],auditLog:[]
};
function getDB(){
  const s=loadDB();
  const merged={...initialDB,...s};
  // Migration 1: oldest versions stored 4-digit PINs. If that's still the case
  // (or users array is missing/empty), reset to the current default seed.
  const looksLikeOldPinUsers = !Array.isArray(merged.users) || merged.users.length===0 ||
    merged.users.some(u=>!u.password || /^\d{4}$/.test(u.password||""));
  if(looksLikeOldPinUsers){
    merged.users = initialDB.users;
    saveDB(merged);
  }
  // Migration 2: password-only version (no loginId field) — add a loginId to every
  // existing user instead of wiping them, so custom accounts already created aren't lost.
  const missingLoginId = merged.users.some(u=>!u.loginId);
  if(missingLoginId){
    const seedById = Object.fromEntries(initialDB.users.map(u=>[u.id,u.loginId]));
    const used = new Set();
    merged.users = merged.users.map(u=>{
      if(u.loginId){used.add(u.loginId.toLowerCase());return u;}
      let base = seedById[u.id] || (u.name||"user").toLowerCase().replace(/[^a-z0-9]/g,"")||"user";
      let candidate = base, n=1;
      while(used.has(candidate)){candidate = base + (++n);}
      used.add(candidate);
      return {...u, loginId:candidate};
    });
    saveDB(merged);
  }
  return merged;
}
function setDB(partial){const db=getDB();saveDB({...db,...partial});}

// ── AUDIT LOG ──
function logAction(actorRole,actorName,action,detail){
  const db=getDB();
  const entry={id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),ts:new Date().toISOString(),role:actorRole,name:actorName,action,detail};
  const log=[...(db.auditLog||[]),entry].slice(-500); // keep last 500
  setDB({auditLog:log});
}

      <div style={{padding:"18px 22px 22px"}}>{children}</div>

}

// ── BREADCRUMB + BACK BUTTON ──
// crumbs: array of strings, or {label, nav} objects for clickable crumbs.
// onBack: explicit back handler for drilled-into sub-pages (e.g. Students-under-School).
// onHome: fallback handler (usually navigate("dashboard")) used when no onBack is given,
//         so every page — top-level or nested — always has a working back button.
function PageHeader({crumbs,onBack,onHome,title,action}){
  const goBack=onBack||onHome;
  return <div style={{marginBottom:18}}>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
      {goBack&&<button onClick={goBack} style={{...btn("ghost"),padding:"6px 12px",fontSize:12}}>← Back</button>}
      {crumbs&&crumbs.length>0&&<div style={{fontSize:11,color:"var(--muted)"}}>
        {crumbs.map((c,i)=>{
          const item=typeof c==="string"?{label:c,nav:null}:c;
          const isLast=i===crumbs.length-1;
          return <span key={i}>
            {i>0&&" / "}
            <span onClick={item.nav&&!isLast?item.nav:undefined}
              style={{fontWeight:isLast?700:400,color:isLast?"var(--text)":"var(--accent)",cursor:item.nav&&!isLast?"pointer":"default",textDecoration:item.nav&&!isLast?"underline":"none"}}>
              {item.label}
            </span>
          </span>;

    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
      <h2 style={{fontSize:20,fontWeight:800}}>{title}</h2>
      {action}
    </div>
  </div>;
}

// ── AUTH ──
function useAuth(){
  const [user,setUser]=useState(null);
  const login=(loginId,password)=>{const db=getDB();const found=db.users.find(u=>u.loginId?.toLowerCase()===String(loginId||"").toLowerCase()&&u.password===password);if(found){setUser(found);logAction(found.role,found.name,"LOGIN",`${found.name} logged in`);return true;}return false;};
  const logout=()=>{if(user)logAction(user.role,user.name,"LOGOUT",`${user.name} logged out`);setUser(null);};
  return{user,login,logout};
}

// ── LOGIN ──
function LoginScreen({onLogin}){
  const [loginId,setLoginId]=useState("");
  const [password,setPassword]=useState("");
  const [err,setErr]=useState("");
  const [detectedRole,setDetectedRole]=useState(null);
  useEffect(()=>{
    const db=getDB();
    const found=db.users.find(u=>u.loginId?.toLowerCase()===loginId.toLowerCase()&&u.password===password&&loginId&&password);
    setDetectedRole(found?found.role:null);
  },[loginId,password]);
  const handle=()=>{if(!onLogin(loginId,password)){setErr("Invalid login ID or password");setPassword("");setDetectedRole(null);}};
  const r=detectedRole?ROLE_COLORS[detectedRole]:null;
  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}>
    <div style={{textAlign:"center",width:320}}>
      <div style={{fontSize:52,marginBottom:6}}>🦕</div>

        <input type="text" autoCapitalize="none" autoCorrect="off" value={loginId} onChange={e=>{setLoginId(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&handle()} placeholder="Login ID" style={{...inp,fontSize:15,marginBottom:14}}/>
        <div style={{fontSize:12,fontWeight:700,color:"var(--muted)",marginBottom:10,textAlign:"left"}}>PASSWORD</div>
        <input type="password" value={password} onChange={e=>{setPassword(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&handle()} placeholder="Password" style={{...inp,fontSize:15,marginBottom:10}}/>
        {r&&<div style={{marginBottom:10,padding:"8px 0",borderRadius:8,background:r.bg}}>

    </div>
  </div>;
}

// ── GOOGLE DRIVE SAVE ──
function useGoogleDrive(){
  const [ready,setReady]=useState(false);
  const [signedIn,setSignedIn]=useState(false);
  const [account,setAccount]=useState(null);
  const tokenClient=useRef(null);
  const accessToken=useRef(null);
  const pendingResolve=useRef(null);

  useEffect(()=>{
    const check=setInterval(()=>{
      if(window.google&&window.google.accounts&&window.gapi){
        clearInterval(check);
        window.gapi.load("client",()=>{
          window.gapi.client.init({}).then(()=>{
            tokenClient.current=window.google.accounts.oauth2.initTokenClient({
              client_id:GOOGLE_CLIENT_ID,
              scope:DRIVE_SCOPE,
              callback:(resp)=>{
                if(resp&&resp.access_token){
                  accessToken.current=resp.access_token;
                  setSignedIn(true);
                  fetch("https://www.googleapis.com/oauth2/v3/userinfo",{headers:{Authorization:"Bearer "+resp.access_token}})
                    .then(r=>r.ok?r.json():null).then(info=>{if(info)setAccount(info.email||info.name||"Google account");}).catch(()=>{});
                  if(pendingResolve.current){pendingResolve.current({ok:true});pendingResolve.current=null;}
                } else if(pendingResolve.current){
                  pendingResolve.current({ok:false,reason:"No access token returned."});
                  pendingResolve.current=null;
                }
              },
              error_callback:(err)=>{
                let reason="Sign-in was cancelled or blocked.";
                if(err&&err.type==="popup_failed_to_open")reason="The sign-in popup was blocked by your browser. Please allow popups for this site and try again.";
                else if(err&&err.type==="popup_closed")reason="The sign-in popup was closed before completing.";
                if(pendingResolve.current){pendingResolve.current({ok:false,reason});pendingResolve.current=null;}
              }
            });
            setReady(true);
          }).catch(e=>{setReady(false);console.error("Drive init failed",e);});
        });
      }
    },300);
    const timeout=setTimeout(()=>clearInterval(check),15000);
    return ()=>{clearInterval(check);clearTimeout(timeout);};
  },[]);

  // Returns a promise that resolves once the popup completes (success or failure),
  // instead of returning immediately while the popup is still open.
  const ensureSignedIn=()=>{
    return new Promise((resolve)=>{
      if(accessToken.current){resolve({ok:true});return;}
      if(!tokenClient.current){resolve({ok:false,reason:"Google sign-in is still loading. Please wait a moment and try again."});return;}
      pendingResolve.current=resolve;
      try{tokenClient.current.requestAccessToken({prompt:"consent"});}
      catch(e){pendingResolve.current=null;resolve({ok:false,reason:e.message});}
    });
  };

  const uploadToDrive=async(filename,content,mimeType)=>{
    const auth=await ensureSignedIn();
    if(!auth.ok)return{ok:false,reason:auth.reason};
    try{
      const metadata={name:filename,parents:[GOOGLE_DRIVE_FOLDER_ID]};
      const boundary="-------happydino_boundary";
      const delimiter="\r\n--"+boundary+"\r\n";
      const closeDelim="\r\n--"+boundary+"--";
      const multipartBody=
        delimiter+"Content-Type: application/json\r\n\r\n"+JSON.stringify(metadata)+
        delimiter+"Content-Type: "+mimeType+"\r\n\r\n"+content+
        closeDelim;
      const res=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",{
        method:"POST",
        headers:{"Authorization":"Bearer "+accessToken.current,"Content-Type":"multipart/related; boundary="+boundary},
        body:multipartBody
      });
      if(res.status===401){
        // Token expired/invalid — clear and ask caller to retry, which will trigger a fresh sign-in.
        accessToken.current=null;setSignedIn(false);
        return{ok:false,reason:"Your Google session expired. Please click the button again to sign in and retry."};
      }
      if(!res.ok){const t=await res.text();return{ok:false,reason:`Drive API error (${res.status}): ${t.slice(0,200)}`};}
      const data=await res.json();
      return{ok:true,data};
    }catch(e){
      return{ok:false,reason:"Network error: "+e.message};
    }
  };

  // List files previously saved by this app in the target Drive folder, for the Load-from-Drive feature.
  const listDriveFiles=async()=>{
    const auth=await ensureSignedIn();
    if(!auth.ok)return{ok:false,reason:auth.reason};
    try{
      const q=encodeURIComponent(`'${GOOGLE_DRIVE_FOLDER_ID}' in parents and trashed=false`);
      const res=await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,modifiedTime,mimeType)&orderBy=modifiedTime desc&pageSize=50`,{
        headers:{"Authorization":"Bearer "+accessToken.current}
      });
      if(res.status===401){accessToken.current=null;setSignedIn(false);return{ok:false,reason:"Your Google session expired. Please click again to sign in and retry."};}
      if(!res.ok){const t=await res.text();return{ok:false,reason:`Drive API error (${res.status}): ${t.slice(0,200)}`};}
      const data=await res.json();
      return{ok:true,files:data.files||[]};
    }catch(e){
      return{ok:false,reason:"Network error: "+e.message};
    }
  };

  const downloadDriveFile=async(fileId)=>{
    const auth=await ensureSignedIn();
    if(!auth.ok)return{ok:false,reason:auth.reason};
    try{
      const res=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{
        headers:{"Authorization":"Bearer "+accessToken.current}
      });
      if(!res.ok){const t=await res.text();return{ok:false,reason:`Drive API error (${res.status}): ${t.slice(0,200)}`};}
      const text=await res.text();
      return{ok:true,content:text};
    }catch(e){
      return{ok:false,reason:"Network error: "+e.message};
    }
  };

  return{ready,signedIn,account,uploadToDrive,listDriveFiles,downloadDriveFile};
}

// ── DASHBOARD ──
function Dashboard({db,navigate,role}){
  const schools=db.schools||[];const sessions=db.sessions||[];
  const payments=db.payments||[];const expenses=db.expenses||[];
  const paid=payments.filter(p=>p.status==="paid").reduce((a,p)=>a+parseFloat(p.amount||0),0);
  const unpaid=payments.filter(p=>p.status==="unpaid").reduce((a,p)=>a+parseFloat(p.amount||0),0);
  const refunded=payments.filter(p=>p.status==="refunded").reduce((a,p)=>a+parseFloat(p.amount||0),0);
  const totalRev=paid+unpaid;
  const totalExp=expenses.reduce((a,e)=>a+parseFloat(e.amount||0),0);
  const bycat=(c)=>expenses.filter(e=>e.category===c).reduce((a,e)=>a+parseFloat(e.amount||0),0);
  const upcoming=sessions.filter(s=>s.status==="scheduled").slice(0,5);
  const schoolsWithCamps=[...new Set(sessions.map(s=>s.schoolId))].length;
  const completedCount=sessions.filter(s=>s.status==="completed").length;
  const scheduledCount=sessions.filter(s=>s.status==="scheduled").length;
  const hideRevenue=role==="user";
  return <div>
    <h2 style={{fontSize:20,fontWeight:800,marginBottom:20}}>Dashboard</h2>
    <SectionHeader label="Schools Overview"/>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:20}}>
      <StatCard label="Schools Approached" value={schools.length} color="#7c3aed" onClick={()=>navigate("schools")}/>
      <StatCard label="With Camps" value={schoolsWithCamps} color="#16a34a" onClick={()=>navigate("schools")}/>
      <StatCard label="Completed Sessions" value={completedCount} color="#2563eb" onClick={()=>navigate("sessions","completed")}/>
      <StatCard label="Scheduled" value={scheduledCount} color="#d97706" onClick={()=>navigate("sessions","scheduled")}/>
    </div>
    {!hideRevenue&&<>
    <SectionHeader label="Revenue"/>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:20}}>
      <StatCard label="Total Revenue" value={fmt(totalRev)} color="#16a34a" onClick={()=>navigate("payments","all")}/>
      <StatCard label="Paid" value={fmt(paid)} color="#2563eb" onClick={()=>navigate("payments","paid")}/>
      <StatCard label="Unpaid" value={fmt(unpaid)} color="#d97706" onClick={()=>navigate("payments","unpaid")}/>
      <StatCard label="Refunded" value={fmt(refunded)} color="#ef4444" onClick={()=>navigate("payments","refunded")}/>
    </div>
    <SectionHeader label="Expenses"/>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10,marginBottom:20}}>
      <StatCard label="Total Expenses" value={fmt(totalExp)} color="#7c3aed" onClick={()=>navigate("reports")}/>
      {["materials","crew","meals","mileage","claims","others"].map(c=><StatCard key={c} label={c.charAt(0).toUpperCase()+c.slice(1)} value={fmt(bycat(c))} color="#64748b" onClick={()=>navigate("reports")}/>)}
    </div>
    <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:12,padding:"14px 18px",marginBottom:20,display:"flex",gap:24,flexWrap:"wrap",alignItems:"center"}}>
      <div><div style={{fontSize:11,color:"var(--muted)",fontWeight:700}}>NET P&L</div>
        <div style={{fontSize:26,fontWeight:800,color:(totalRev-totalExp)>=0?"#16a34a":"#ef4444"}}>{fmt(totalRev-totalExp)}</div></div>
      <div style={{flex:1,height:6,background:"var(--border)",borderRadius:99,minWidth:100}}>
        <div style={{width:`${Math.min(100,totalRev>0?(paid/totalRev)*100:0)}%`,height:"100%",background:"#16a34a",borderRadius:99}}/>
      </div>
      <div style={{fontSize:12,color:"var(--muted)"}}>{totalRev>0?Math.round((paid/totalRev)*100):0}% collected</div>
    </div>
    </>}
    <SectionHeader label="Upcoming Sessions"/>
    {upcoming.length===0?<div style={{color:"var(--muted)",fontSize:13}}>No scheduled sessions.</div>:
    <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:12,overflow:"hidden"}}>
      {upcoming.map((s,i)=>{
        const school=(db.schools||[]).find(sc=>sc.id===s.schoolId);
        const ct=(db.campTypes||[]).find(c=>c.id===s.campTypeId);
        const regCount=(db.registrations||[]).filter(r=>r.sessionId===s.id).length;
        return <div key={s.id} style={{display:"flex",gap:12,padding:"12px 16px",borderTop:i?"1px solid var(--border)":"none",alignItems:"center",flexWrap:"wrap"}}>
          <div style={{minWidth:76,fontSize:12,fontWeight:700,color:"var(--accent)"}}>{fmtDate(s.date)}</div>
          <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{school?.name||"—"}</div><div style={{fontSize:12,color:"var(--muted)"}}>{ct?.name||"—"}</div></div>
          <Badge label={`${regCount} students`} color="blue"/>
        </div>;
      })}
    </div>}
  </div>;
}

// ── GLOBAL SEARCH ──
function GlobalSearch({db,onResultClick}){
  const [q,setQ]=useState("");
  const [open,setOpen]=useState(false);
  const results=(()=>{
    if(!q||q.length<2)return[];
    const ql=q.toLowerCase();
    const out=[];
    (db.schools||[]).forEach(s=>{if(s.name?.toLowerCase().includes(ql))out.push({type:"School",label:s.name,sub:s.address,nav:"schools"});});
    (db.students||[]).forEach(s=>{if(s.name?.toLowerCase().includes(ql))out.push({type:"Student",label:s.name,sub:s.className,nav:"students"});});
    (db.crew||[]).forEach(c=>{if(c.name?.toLowerCase().includes(ql))out.push({type:"Crew",label:c.name,sub:c.phone,nav:"crew"});});
    return out.slice(0,8);
  })();
  return <div style={{position:"relative",flex:1,maxWidth:280}}>
    <input value={q} onChange={e=>{setQ(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)} onBlur={()=>setTimeout(()=>setOpen(false),150)}
      placeholder="🔍 Search schools, students, crew..." style={{...inp,padding:"7px 12px",fontSize:12}}/>
    {open&&results.length>0&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:"var(--surface)",border:"1px solid var(--border)",borderRadius:8,marginTop:4,boxShadow:"0 8px 24px rgba(0,0,0,0.15)",zIndex:200,maxHeight:300,overflowY:"auto"}}>
      {results.map((r,i)=><div key={i} onClick={()=>{onResultClick(r.nav);setQ("");setOpen(false);}} style={{padding:"8px 12px",cursor:"pointer",borderTop:i?"1px solid var(--border)":"none",fontSize:12}}
        onMouseDown={e=>e.preventDefault()}>
        <Badge label={r.type} color={r.type==="School"?"purple":r.type==="Student"?"blue":"green"}/> <b>{r.label}</b>
        {r.sub&&<div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{r.sub}</div>}
      </div>)}
    </div>}
  </div>;
}

      <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13,marginBottom:10}}>
        <input type="checkbox" checked={form.discountable||false} onChange={e=>setForm({...form,discountable:e.target.checked})}/> Enable sibling discount
      </label>

        <Field label="2nd Sibling Discount (%)"><input type="number" style={inp} value={form.sibling2Pct||""} onChange={e=>setForm({...form,sibling2Pct:e.target.value})}/></Field>
        <Field label="3rd+ Sibling Discount (%)"><input type="number" style={inp} value={form.sibling3Pct||""} onChange={e=>setForm({...form,sibling3Pct:e.target.value})}/></Field>
      </div>}
      <Field label="Description"><textarea style={{...inp,minHeight:50}} value={form.description||""} onChange={e=>setForm({...form,description:e.target.value})}/></Field>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button onClick={()=>setShowModal(false)} style={btn("ghost")}>Cancel</button>
        <button onClick={save} style={btn("primary")}>Save</button>
      </div>
    </Modal>}
  </div>;
}

// ── SESSIONS ──
function Sessions({db,refresh,initialFilter,actor,onHome}){
  const [showModal,setShowModal]=useState(false);
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({});
  const [selected,setSelected]=useState(null);
  const [filter,setFilter]=useState(initialFilter||"all");
  const sessions=db.sessions||[];
  useEffect(()=>{if(initialFilter)setFilter(initialFilter);},[initialFilter]);
  const openAdd=()=>{setForm({id:uid(),schoolId:"",campTypeId:"",date:"",time:"",status:"scheduled",notes:""});setEditing(null);setShowModal(true);};
  const openEdit=(s)=>{setForm({...s});setEditing(s.id);setShowModal(true);};
  const save=()=>{const list=editing?sessions.map(s=>s.id===editing?form:s):[...sessions,form];setDB({sessions:list});logAction(actor.role,actor.name,editing?"EDIT_SESSION":"ADD_SESSION",form.date);refresh();setShowModal(false);};
  const del=(id)=>{if(window.confirm("Delete session?")){setDB({sessions:sessions.filter(s=>s.id!==id)});logAction(actor.role,actor.name,"DELETE_SESSION",id);refresh();}};
  const filtered=filter==="all"?sessions:sessions.filter(s=>s.status===filter);
  if(selected)return <SessionDetail session={selected} db={db} refresh={refresh} onBack={()=>setSelected(null)} actor={actor}/>;
  return <div>
    <PageHeader crumbs={[{label:"Dashboard",nav:onHome},"Sessions",filter!=="all"?filter:null].filter(Boolean)} onHome={onHome} title="Camp Sessions" action={<button onClick={openAdd} style={btn("primary")}>+ New Session</button>}/>
    <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
      {["all","scheduled","completed","cancelled"].map(f=><button key={f} onClick={()=>setFilter(f)} style={{padding:"5px 12px",borderRadius:8,border:"1px solid var(--border)",cursor:"pointer",fontWeight:600,fontSize:12,background:filter===f?"var(--accent)":"var(--surface)",color:filter===f?"#fff":"var(--text)",textTransform:"capitalize"}}>{f}</button>)}
    </div>
    {filtered.length===0?<EmptyState icon="📅" text="No sessions found."/>:
    <div style={{display:"grid",gap:10}}>
      {[...filtered].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(s=>{
        const school=(db.schools||[]).find(sc=>sc.id===s.schoolId);
        const ct=(db.campTypes||[]).find(c=>c.id===s.campTypeId);
        const regCount=(db.registrations||[]).filter(r=>r.sessionId===s.id).length;
        const crewCount=(db.crewAssignments||[]).filter(a=>a.sessionId===s.id).length;
        const sc={scheduled:"amber",completed:"green",cancelled:"red"};
        return <div key={s.id} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:12,padding:"14px 16px",cursor:"pointer"}} onClick={()=>setSelected(s)}>
          <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
            <div>
              <div style={{fontWeight:700,fontSize:14}}>{school?.name||"—"} <span style={{fontWeight:400,fontSize:12,color:"var(--muted)"}}>· {ct?.name||"—"}</span></div>
              <div style={{fontSize:12,color:"var(--muted)"}}>{fmtDate(s.date)}{s.time&&` at ${s.time}`}</div>
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"flex-start"}}>
              <Badge label={s.status} color={sc[s.status]||"gray"}/>
              <Badge label={`${regCount} students`} color="blue"/>
              <Badge label={`${crewCount} crew`} color="purple"/>
              <button onClick={e=>{e.stopPropagation();openEdit(s);}} style={btn("ghost")}>Edit</button>
              <button onClick={e=>{e.stopPropagation();del(s.id);}} style={btn("danger")}>Del</button>
            </div>
          </div>
        </div>;
      })}
    </div>}
    {showModal&&<Modal title={editing?"Edit Session":"New Session"} onClose={()=>setShowModal(false)}>
      <Field label="School"><select style={inp} value={form.schoolId||""} onChange={e=>setForm({...form,schoolId:e.target.value})}>
        <option value="">Select school</option>{(db.schools||[]).map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></Field>
      <Field label="Camp Type"><select style={inp} value={form.campTypeId||""} onChange={e=>setForm({...form,campTypeId:e.target.value})}>
        <option value="">Select camp type</option>{(db.campTypes||[]).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Field label="Date"><input type="date" style={inp} value={form.date||""} onChange={e=>setForm({...form,date:e.target.value})}/></Field>
        <Field label="Time"><input type="time" style={inp} value={form.time||""} onChange={e=>setForm({...form,time:e.target.value})}/></Field>
      </div>
      <Field label="Status"><select style={inp} value={form.status||"scheduled"} onChange={e=>setForm({...form,status:e.target.value})}>
        <option value="scheduled">Scheduled</option><option value="completed">Completed</option><option value="cancelled">Cancelled</option></select></Field>
      <Field label="Notes"><textarea style={{...inp,minHeight:60}} value={form.notes||""} onChange={e=>setForm({...form,notes:e.target.value})}/></Field>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button onClick={()=>setShowModal(false)} style={btn("ghost")}>Cancel</button>
        <button onClick={save} style={btn("primary")}>Save</button>
      </div>
    </Modal>}
  </div>;
}

  const school=(db.schools||[]).find(sc=>sc.id===s.schoolId);
  const ct=(db.campTypes||[]).find(c=>c.id===s.campTypeId);

function SessionRegistrations({session,db,refresh,actor}){
  const [showModal,setShowModal]=useState(false);
  const [form,setForm]=useState({studentId:"",paymentOverride:""});
  const regs=(db.registrations||[]).filter(r=>r.sessionId===session.id);
  const ct=(db.campTypes||[]).find(c=>c.id===session.campTypeId);
  const schoolStudents=(db.students||[]).filter(st=>st.schoolId===session.schoolId);
  const calcFee=(studentId)=>{
    if(!ct)return 0;const base=parseFloat(ct.fee||0);if(!ct.discountable)return base;
    const student=(db.students||[]).find(s=>s.id===studentId);if(!student)return base;
    const siblings=(db.students||[]).filter(s=>s.parentPhone===student.parentPhone&&s.id!==student.id);
    const sibRegs=regs.filter(r=>siblings.map(s=>s.id).includes(r.studentId));
    if(sibRegs.length===0)return base;if(sibRegs.length===1)return base*(1-parseFloat(ct.sibling2Pct||0)/100);
    return base*(1-parseFloat(ct.sibling3Pct||0)/100);
  };
  const addReg=()=>{
    if(!form.studentId)return;
    const fee=form.paymentOverride||calcFee(form.studentId);
    const reg={id:uid(),sessionId:session.id,studentId:form.studentId,fee,consentSigned:false,present:false};
    const pay={id:uid(),registrationId:reg.id,studentId:form.studentId,sessionId:session.id,amount:fee,status:"unpaid",method:"",paidAt:"",invoiceNo:`INV-${Date.now()}`};
    setDB({registrations:[...(db.registrations||[]),reg],payments:[...(db.payments||[]),pay]});
    logAction(actor.role,actor.name,"REGISTER_STUDENT",form.studentId);
    refresh();setShowModal(false);setForm({studentId:"",paymentOverride:""});
  };
  const updatePay=(payId,status)=>{setDB({payments:(db.payments||[]).map(p=>p.id===payId?{...p,status,paidAt:status==="paid"?new Date().toISOString():p.paidAt}:p)});logAction(actor.role,actor.name,"UPDATE_PAYMENT",`${payId} -> ${status}`);refresh();};
  const toggleConsent=(regId)=>{setDB({registrations:(db.registrations||[]).map(r=>r.id===regId?{...r,consentSigned:!r.consentSigned}:r)});refresh();};
  const removeReg=(regId)=>{if(!window.confirm("Remove?"))return;setDB({registrations:(db.registrations||[]).filter(r=>r.id!==regId)});refresh();};
  const printInvoice=(reg)=>{
    const student=(db.students||[]).find(s=>s.id===reg.studentId);
    const pay=(db.payments||[]).find(p=>p.registrationId===reg.id);
    const school=(db.schools||[]).find(s=>s.id===session.schoolId);
    const campType=(db.campTypes||[]).find(c=>c.id===session.campTypeId);
    if(pay)generateInvoicePDF(pay,student,session,school,campType,getDB().settings);
  };
  const available=schoolStudents.filter(s=>!regs.map(r=>r.studentId).includes(s.id));
  const totalFees=regs.reduce((a,r)=>a+parseFloat(r.fee||0),0);
  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div style={{fontSize:13,color:"var(--muted)"}}>{regs.length} registered · Total: <b style={{color:"var(--text)"}}>{fmt(totalFees)}</b></div>
      <button onClick={()=>setShowModal(true)} style={btn("primary")}>+ Register Student</button>
    </div>
    {regs.length===0?<EmptyState icon="📋" text="No registrations yet."/>:
    <div style={{display:"grid",gap:8}}>
      {regs.map(reg=>{
        const student=(db.students||[]).find(s=>s.id===reg.studentId);
        const pay=(db.payments||[]).find(p=>p.registrationId===reg.id);
        return <div key={reg.id} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:10,padding:"12px 14px",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8,alignItems:"center"}}>
          <div>
            <div style={{fontWeight:600,fontSize:13}}>{student?.name||"—"}</div>
            <div style={{fontSize:12,color:"var(--muted)"}}>{student?.parentName} · {student?.parentPhone}</div>
            <div style={{fontSize:11,color:"var(--muted)"}}>Inv: {pay?.invoiceNo}</div>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontSize:13,fontWeight:700}}>{fmt(reg.fee)}</span>
            <Badge label={pay?.status||"—"} color={pay?.status==="paid"?"green":pay?.status==="refunded"?"red":"amber"}/>
            <Badge label={reg.consentSigned?"Consent ✓":"No consent"} color={reg.consentSigned?"green":"red"}/>
            {pay?.status==="unpaid"&&<button onClick={()=>updatePay(pay.id,"paid")} style={{...btn("ghost"),fontSize:11,padding:"3px 8px"}}>Mark Paid</button>}
            {pay?.status==="paid"&&<button onClick={()=>updatePay(pay.id,"refunded")} style={{...btn("ghost"),fontSize:11,padding:"3px 8px"}}>Refund</button>}
            <button onClick={()=>toggleConsent(reg.id)} style={{...btn("ghost"),fontSize:11,padding:"3px 8px"}}>Consent</button>
            <button onClick={()=>printInvoice(reg)} style={{...btn("ghost"),fontSize:11,padding:"3px 8px"}}>🖨 Invoice</button>
            <button onClick={()=>removeReg(reg.id)} style={{...btn("danger"),fontSize:11,padding:"3px 8px"}}>✕</button>
          </div>
        </div>;
      })}
    </div>}
    {showModal&&<Modal title="Register Student" onClose={()=>setShowModal(false)}>
      <Field label="Student"><select style={inp} value={form.studentId} onChange={e=>setForm({...form,studentId:e.target.value})}>
        <option value="">Select student</option>{available.map(s=><option key={s.id} value={s.id}>{s.name} — {s.className}</option>)}</select></Field>
      {form.studentId&&ct&&<div style={{background:"var(--surface2)",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:13}}>
        Calculated fee: <b>{fmt(calcFee(form.studentId))}</b>{ct.discountable&&<span style={{color:"var(--muted)",fontSize:11}}> (sibling discount auto-applied)</span>}</div>}
      <Field label="Override Fee" hint="Leave blank to use calculated fee">
        <input type="number" style={inp} value={form.paymentOverride} onChange={e=>setForm({...form,paymentOverride:e.target.value})} placeholder={ct?`Default: ${fmt(ct.fee)}`:""}/></Field>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button onClick={()=>setShowModal(false)} style={btn("ghost")}>Cancel</button>
        <button onClick={addReg} style={btn("primary")}>Register</button>
      </div>
    </Modal>}
  </div>;
}

function SessionCrew({session,db,refresh,actor}){
  const [showModal,setShowModal]=useState(false);

          <div><div style={{fontWeight:600,fontSize:13}}>{crew?.name||"—"}</div><div style={{fontSize:12,color:"var(--muted)"}}>{a.role} · {"★".repeat(Math.round(crew?.rating||0))}</div></div>

      <Field label="Role"><select style={inp} value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
        {["Lead Facilitator","Facilitator","Assistant","Driver","Support"].map(r=><option key={r}>{r}</option>)}</select></Field>
      <Field label="Fee (RM)" hint={`Default from camp type: ${fmt(ct?.crewFee)}`}>
        <input type="number" style={inp} value={form.feeOverride} onChange={e=>setForm({...form,feeOverride:e.target.value})} placeholder={fmt(ct?.crewFee||0)}/></Field>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button onClick={()=>setShowModal(false)} style={btn("ghost")}>Cancel</button>

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>

function Payments({db,refresh,initialFilter,role,actor,onHome}){
  const payments=db.payments||[];
  const [filter,setFilter]=useState(initialFilter||"all");
  useEffect(()=>{if(initialFilter)setFilter(initialFilter);},[initialFilter]);
  const filtered=filter==="all"?payments:payments.filter(p=>p.status===filter);
  const tot=(s)=>payments.filter(p=>p.status===s).reduce((a,p)=>a+parseFloat(p.amount||0),0);
  const hideTotals=role==="user";
  const updateStatus=(id,status)=>{setDB({payments:payments.map(p=>p.id===id?{...p,status,paidAt:status==="paid"?new Date().toISOString():p.paidAt}:p)});logAction(actor.role,actor.name,"UPDATE_PAYMENT",`${id} -> ${status}`);refresh();};
  const printInvoice=(p)=>{
    const student=(db.students||[]).find(s=>s.id===p.studentId);
    const session=(db.sessions||[]).find(s=>s.id===p.sessionId);
    const school=(db.schools||[]).find(s=>s.id===session?.schoolId);
    const campType=(db.campTypes||[]).find(c=>c.id===session?.campTypeId);
    generateInvoicePDF(p,student,session,school,campType,getDB().settings);
  };
  return <div>
    <PageHeader crumbs={[{label:"Dashboard",nav:onHome},"Payments",filter!=="all"?filter:null].filter(Boolean)} onHome={onHome} title="Payments"/>
    {!hideTotals&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10,marginBottom:18}}>
      <StatCard label="Paid" value={fmt(tot("paid"))} color="#16a34a"/>
      <StatCard label="Unpaid" value={fmt(tot("unpaid"))} color="#d97706"/>
      <StatCard label="Refunded" value={fmt(tot("refunded"))} color="#ef4444"/>
    </div>}
    {hideTotals&&<div style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 14px",marginBottom:18,fontSize:12,color:"var(--muted)"}}>
      💡 Revenue totals are restricted for your role. You can still view and update individual payment statuses below.
    </div>}
    <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
      {["all","paid","unpaid","refunded"].map(f=><button key={f} onClick={()=>setFilter(f)} style={{padding:"5px 12px",borderRadius:8,border:"1px solid var(--border)",cursor:"pointer",fontWeight:600,fontSize:12,background:filter===f?"var(--accent)":"var(--surface)",color:filter===f?"#fff":"var(--text)",textTransform:"capitalize"}}>{f}</button>)}
    </div>
    {filtered.length===0?<EmptyState icon="💳" text="No payments."/>:
    <div style={{display:"grid",gap:8}}>
      {filtered.map(p=>{
        const student=(db.students||[]).find(s=>s.id===p.studentId);
        const session=(db.sessions||[]).find(s=>s.id===p.sessionId);
        const school=(db.schools||[]).find(s=>s.id===session?.schoolId);
        const ct=(db.campTypes||[]).find(c=>c.id===session?.campTypeId);
        return <div key={p.id} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8,alignItems:"center"}}>
          <div>
            <div style={{fontWeight:600,fontSize:13}}>{student?.name||"—"}</div>
            <div style={{fontSize:12,color:"var(--muted)"}}>{school?.name} · {ct?.name} · {fmtDate(session?.date)}</div>
            <div style={{fontSize:11,color:"var(--muted)"}}>Inv: {p.invoiceNo}{p.paidAt&&` · Paid: ${fmtDate(p.paidAt)}`}</div>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <span style={{fontWeight:700}}>{fmt(p.amount)}</span>
            <Badge label={p.status} color={p.status==="paid"?"green":p.status==="refunded"?"red":"amber"}/>
            {p.status==="unpaid"&&<button onClick={()=>updateStatus(p.id,"paid")} style={{...btn("ghost"),fontSize:11,padding:"3px 8px"}}>Mark Paid</button>}
            {p.status==="paid"&&<button onClick={()=>updateStatus(p.id,"refunded")} style={{...btn("ghost"),fontSize:11,padding:"3px 8px"}}>Refund</button>}
            <button onClick={()=>printInvoice(p)} style={{...btn("ghost"),fontSize:11,padding:"3px 8px"}}>🖨 Invoice</button>
          </div>
        </div>;
      })}
    </div>}
  </div>;
}

// ── REPORTS ──
function Reports({db,onHome}){
  const sessions=db.sessions||[];const payments=db.payments||[];const expenses=db.expenses||[];
  const report=sessions.map(s=>{
    const school=(db.schools||[]).find(sc=>sc.id===s.schoolId);
    const ct=(db.campTypes||[]).find(c=>c.id===s.campTypeId);
    const regs=(db.registrations||[]).filter(r=>r.sessionId===s.id);
    const rev=payments.filter(p=>p.sessionId===s.id&&p.status!=="refunded").reduce((a,p)=>a+parseFloat(p.amount||0),0);
    const exp=expenses.filter(e=>e.sessionId===s.id).reduce((a,e)=>a+parseFloat(e.amount||0),0);
    const crew=(db.crewAssignments||[]).filter(a=>a.sessionId===s.id).reduce((a,c)=>a+parseFloat(c.fee||0),0);
    return{...s,school,ct,regs,rev,exp:exp+crew,net:rev-exp-crew};
  });
  const totalRev=report.reduce((a,s)=>a+s.rev,0);
  const totalExp=report.reduce((a,s)=>a+s.exp,0);
  return <div>
    <PageHeader crumbs={[{label:"Dashboard",nav:onHome},"Reports"]} onHome={onHome} title="Reports"/>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:18}}>
      <StatCard label="Total Revenue" value={fmt(totalRev)} color="#16a34a"/>
      <StatCard label="Total Expenses" value={fmt(totalExp)} color="#ef4444"/>
      <StatCard label="Net P&L" value={fmt(totalRev-totalExp)} color={(totalRev-totalExp)>=0?"#16a34a":"#ef4444"}/>
    </div>
    <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:12,overflow:"hidden"}}>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{background:"var(--surface2)"}}>
            {["Camp Type","School","Date","Students","Revenue","Expenses","Net P&L","Status"].map(h=><th key={h} style={{padding:"10px 12px",textAlign:"left",fontWeight:700,color:"var(--muted)",fontSize:11,textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {report.length===0?<tr><td colSpan={8} style={{padding:"24px",textAlign:"center",color:"var(--muted)"}}>No sessions yet.</td></tr>:
            report.map((s,i)=><tr key={s.id} style={{borderTop:"1px solid var(--border)",background:i%2?"var(--surface2)":"transparent"}}>
              <td style={{padding:"10px 12px",fontWeight:600}}>{s.ct?.name||"—"}</td>
              <td style={{padding:"10px 12px"}}>{s.school?.name||"—"}</td>
              <td style={{padding:"10px 12px"}}>{fmtDate(s.date)}</td>
              <td style={{padding:"10px 12px"}}>{s.regs.length}</td>
              <td style={{padding:"10px 12px"}}>{fmt(s.rev)}</td>
              <td style={{padding:"10px 12px"}}>{fmt(s.exp)}</td>
              <td style={{padding:"10px 12px",fontWeight:700,color:s.net>=0?"#16a34a":"#ef4444"}}>{fmt(s.net)}</td>
              <td style={{padding:"10px 12px"}}><Badge label={s.status} color={s.status==="completed"?"green":s.status==="scheduled"?"amber":"red"}/></td>
            </tr>)}
          </tbody>
        </table>
      </div>
    </div>
  </div>;
}

// ── COMMUNICATIONS ──
function Communications({db,refresh,onHome}){
  const [form,setForm]=useState({sessionId:"",message:""});
  const comms=db.communications||[];const sessions=db.sessions||[];
  const getParents=(sid)=>{const regs=(db.registrations||[]).filter(r=>r.sessionId===sid);return regs.map(r=>{const s=(db.students||[]).find(st=>st.id===r.studentId);return s?{name:s.parentName,phone:s.parentPhone}:null;}).filter(Boolean);};
  const send=()=>{
    if(!form.sessionId||!form.message)return;
    const parents=getParents(form.sessionId);
    setDB({communications:[...comms,{id:uid(),sessionId:form.sessionId,message:form.message,sentAt:new Date().toISOString(),recipientCount:parents.length}]});
    refresh();
    if(parents[0])window.open(`https://wa.me/${parents[0].phone.replace(/[^0-9]/g,"")}?text=${encodeURIComponent(form.message)}`,"_blank");
    setForm({sessionId:"",message:""});
  };
  return <div>
    <PageHeader crumbs={[{label:"Dashboard",nav:onHome},"Communications"]} onHome={onHome} title="Communications"/>
    <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:12,padding:18,marginBottom:18}}>
      <div style={{fontWeight:700,fontSize:13,marginBottom:12}}>Send Broadcast Message</div>
      <Field label="Session"><select style={inp} value={form.sessionId} onChange={e=>setForm({...form,sessionId:e.target.value})}>
        <option value="">Select session</option>
        {sessions.map(s=>{const school=(db.schools||[]).find(sc=>sc.id===s.schoolId);const ct=(db.campTypes||[]).find(c=>c.id===s.campTypeId);return <option key={s.id} value={s.id}>{school?.name} — {ct?.name} ({fmtDate(s.date)})</option>;})}
      </select></Field>
      {form.sessionId&&<div style={{fontSize:12,color:"var(--muted)",marginBottom:10}}>{getParents(form.sessionId).length} parent contacts</div>}
      <Field label="Message"><textarea style={{...inp,minHeight:80}} value={form.message} onChange={e=>setForm({...form,message:e.target.value})} placeholder="Type your message..."/></Field>
      <button onClick={send} style={btn("primary")}>📲 Send via WhatsApp</button>
    </div>
    <SectionHeader label="Message Log"/>
    {comms.length===0?<EmptyState icon="💬" text="No messages sent yet."/>:
    <div style={{display:"grid",gap:8}}>
      {[...comms].reverse().map(c=>{const s=sessions.find(ss=>ss.id===c.sessionId);const school=(db.schools||[]).find(sc=>sc.id===s?.schoolId);return <div key={c.id} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:10,padding:"12px 14px"}}>
        <div style={{fontWeight:600,fontSize:13}}>{school?.name||"—"} · {fmtDate(c.sentAt)}</div>
        <div style={{fontSize:12,color:"var(--muted)"}}>{c.recipientCount} recipients</div>
        <div style={{fontSize:13,marginTop:4}}>{c.message}</div>
      </div>;})}
    </div>}
  </div>;
}

        <div style={{minWidth:130,color:"var(--muted)"}}>{fmtDateTime(e.ts)}</div>
        <RoleBadge role={e.role}/>
        <div style={{fontWeight:600}}>{e.name}</div>
        <div style={{color:"var(--accent)",fontWeight:600}}>{e.action}</div>
        <div style={{color:"var(--muted)",flex:1}}>{e.detail}</div>
      </div>)}
    </div>}
  </div>;
}

// ── BACKUP & RESTORE ──
function BackupRestore({db,refresh,actor,onHome}){
  const [lastBackup,setLastBackup]=useState(()=>localStorage.getItem("happyDino_lastBackup")||null);
  const [driveStatus,setDriveStatus]=useState("");
  const [driveBusy,setDriveBusy]=useState(false);
  const [showDriveFiles,setShowDriveFiles]=useState(false);
  const [driveFiles,setDriveFiles]=useState([]);
  const [driveFilesLoading,setDriveFilesLoading]=useState(false);
  const drive=useGoogleDrive();
  const esc=(v)=>{if(v==null)return"";const s=String(v);if(s.includes(",")||s.includes('"')||s.includes("\n"))return`"${s.replace(/"/g,'""')}"`;return s;};
  const row=(...cells)=>cells.map(esc).join(",")+"\n";

  const buildCombinedCSV=()=>{
    const d=getDB();
    const now=new Date().toISOString();
    let csv="";
    csv+=`"==== HAPPY DINO XPERIENCE CAMP — FULL EXPORT ===="\n`;
    csv+=`"Export Date:","${fmtDate(now)}"\n`;
    csv+=`"Exported by:","${d.settings?.companyName||"Happy Dino"}"\n\n`;
    csv+=`"---- SCHOOLS ----"\n`;
    csv+=row("Name","Address","Principal","Phone","Email","Sessions","Students","Notes");
    (d.schools||[]).forEach(s=>{const sc=(d.sessions||[]).filter(ss=>ss.schoolId===s.id).length;const st=(d.students||[]).filter(st=>st.schoolId===s.id).length;csv+=row(s.name,s.address,s.principal,s.phone,s.email,sc,st,s.notes);});
    csv+="\n";
    csv+=`"---- STUDENTS ----"\n`;
    csv+=row("Name","IC/MyKid","DOB","Age","Class","School","T-Shirt","Parent Name","Relation","Parent Phone","Emergency Name","Emergency Phone","Allergies","Camps Attended","Upcoming Camps");
    (d.students||[]).forEach(s=>{
      const school=(d.schools||[]).find(sc=>sc.id===s.schoolId);
      const regs=(d.registrations||[]).filter(r=>r.studentId===s.id);
      const attended=regs.filter(r=>{const sess=(d.sessions||[]).find(ss=>ss.id===r.sessionId);return sess?.status==="completed";}).length;
      const upcoming=regs.filter(r=>{const sess=(d.sessions||[]).find(ss=>ss.id===r.sessionId);return sess?.status==="scheduled";}).length;
      csv+=row(s.name,s.ic,s.dob,calcAge(s.dob),s.className,school?.name||"",s.tshirtSize,s.parentName,s.parentRelation,s.parentPhone,s.emergencyName,s.emergencyPhone,s.allergies,attended,upcoming);
    });
    csv+="\n";
    csv+=`"---- CAMP TYPES ----"\n`;
    csv+=row("Name","Fee (RM)","Crew Fee (RM)","Material Cost","Meal Cost","Sibling Discount","2nd %","3rd %","Sessions Used");
    (d.campTypes||[]).forEach(c=>{const sessions=(d.sessions||[]).filter(s=>s.campTypeId===c.id).length;csv+=row(c.name,c.fee,c.crewFee,c.materialCost,c.mealCost,c.discountable?"Yes":"No",c.sibling2Pct,c.sibling3Pct,sessions);});
    csv+="\n";
    csv+=`"---- CAMP SESSIONS ----"\n`;
    csv+=row("School","Camp Type","Date","Time","Status","Students Registered","Crew Assigned","Revenue (RM)","Expenses (RM)","Net P&L (RM)");
    (d.sessions||[]).forEach(s=>{
      const school=(d.schools||[]).find(sc=>sc.id===s.schoolId);
      const ct=(d.campTypes||[]).find(c=>c.id===s.campTypeId);
      const regs=(d.registrations||[]).filter(r=>r.sessionId===s.id).length;
      const crew=(d.crewAssignments||[]).filter(a=>a.sessionId===s.id).length;
      const rev=(d.payments||[]).filter(p=>p.sessionId===s.id&&p.status!=="refunded").reduce((a,p)=>a+parseFloat(p.amount||0),0);
      const exp=(d.expenses||[]).filter(e=>e.sessionId===s.id).reduce((a,e)=>a+parseFloat(e.amount||0),0);
      const crewCost=(d.crewAssignments||[]).filter(a=>a.sessionId===s.id).reduce((a,c)=>a+parseFloat(c.fee||0),0);
      csv+=row(school?.name||"",ct?.name||"",s.date,s.time||"",s.status,regs,crew,rev.toFixed(2),exp.toFixed(2),(rev-exp-crewCost).toFixed(2));
    });
    csv+="\n";
    csv+=`"---- REGISTRATIONS ----"\n`;
    csv+=row("Student","School","Camp Type","Session Date","Fee (RM)","Payment Status","Invoice No","Paid Date","Consent Signed","Attended");
    (d.registrations||[]).forEach(r=>{
      const student=(d.students||[]).find(s=>s.id===r.studentId);
      const session=(d.sessions||[]).find(s=>s.id===r.sessionId);
      const school=(d.schools||[]).find(s=>s.id===session?.schoolId);
      const ct=(d.campTypes||[]).find(c=>c.id===session?.campTypeId);
      const pay=(d.payments||[]).find(p=>p.registrationId===r.id);
      csv+=row(student?.name||"",school?.name||"",ct?.name||"",session?.date||"",r.fee,pay?.status||"",pay?.invoiceNo||"",pay?.paidAt?fmtDate(pay.paidAt):"",r.consentSigned?"Yes":"No",r.present?"Yes":"No");
    });
    csv+="\n";
    csv+=`"---- PAYMENTS ----"\n`;
    csv+=row("Invoice No","Student","School","Camp Type","Session Date","Amount (RM)","Status","Paid Date","Method");
    (d.payments||[]).forEach(p=>{
      const student=(d.students||[]).find(s=>s.id===p.studentId);
      const session=(d.sessions||[]).find(s=>s.id===p.sessionId);
      const school=(d.schools||[]).find(s=>s.id===session?.schoolId);
      const ct=(d.campTypes||[]).find(c=>c.id===session?.campTypeId);
      csv+=row(p.invoiceNo,student?.name||"",school?.name||"",ct?.name||"",session?.date||"",p.amount,p.status,p.paidAt?fmtDate(p.paidAt):"",p.method||"");
    });
    csv+="\n";
    csv+=`"---- CREW ----"\n`;
    csv+=row("Name","NRIC","DOB","Age","Phone","Email","Rating","Total Sessions","Total Earned (RM)","Unpaid Sessions");
    (d.crew||[]).forEach(c=>{const asgn=(d.crewAssignments||[]).filter(a=>a.crewId===c.id);const earned=asgn.reduce((a,x)=>a+parseFloat(x.fee||0),0);const unpaid=asgn.filter(a=>!a.paid).length;csv+=row(c.name,c.nric,c.dob,calcAge(c.dob),c.phone,c.email,c.rating,asgn.length,earned.toFixed(2),unpaid);});
    csv+="\n";
    csv+=`"---- CREW ASSIGNMENTS ----"\n`;
    csv+=row("Crew Name","School","Camp Type","Session Date","Role","Fee (RM)","Paid");
    (d.crewAssignments||[]).forEach(a=>{
      const crew=(d.crew||[]).find(c=>c.id===a.crewId);
      const session=(d.sessions||[]).find(s=>s.id===a.sessionId);
      const school=(d.schools||[]).find(s=>s.id===session?.schoolId);
      const ct=(d.campTypes||[]).find(c=>c.id===session?.campTypeId);
      csv+=row(crew?.name||"",school?.name||"",ct?.name||"",session?.date||"",a.role,a.fee,a.paid?"Yes":"No");
    });
    csv+="\n";
    csv+=`"---- EXPENSES ----"\n`;
    csv+=row("School","Camp Type","Session Date","Category","Label","Amount (RM)","KM","Rate/KM","Notes");
    (d.expenses||[]).forEach(e=>{
      const session=(d.sessions||[]).find(s=>s.id===e.sessionId);
      const school=(d.schools||[]).find(s=>s.id===session?.schoolId);
      const ct=(d.campTypes||[]).find(c=>c.id===session?.campTypeId);
      csv+=row(school?.name||"",ct?.name||"",session?.date||"",e.category,e.label,e.amount,e.km||"",e.ratePerKm||"",e.notes||"");
    });
    csv+="\n";
    csv+=`"---- INVENTORY ----"\n`;
    csv+=row("Name","Category","SKU","Unit Cost (RM)","Qty","Unit","Total Value (RM)","Min Qty","Low Stock","Notes");
    (d.inventory||[]).forEach(i=>{const val=parseFloat(i.unitCost||0)*parseInt(i.qty||0);const low=parseInt(i.qty)<=parseInt(i.minQty||0);csv+=row(i.name,i.category,i.sku||"",i.unitCost,i.qty,i.unit,val.toFixed(2),i.minQty,low?"YES":"no",i.notes||"");});
    csv+="\n";
    csv+=`"---- COMMUNICATIONS ----"\n`;
    csv+=row("School","Session Date","Sent At","Message","Recipients");
    (d.communications||[]).forEach(c=>{const session=(d.sessions||[]).find(s=>s.id===c.sessionId);const school=(d.schools||[]).find(s=>s.id===session?.schoolId);csv+=row(school?.name||"",session?.date||"",fmtDate(c.sentAt),c.message,c.recipientCount);});
    return csv;
  };

  const markBackedUp=()=>{const now=new Date().toISOString();localStorage.setItem("happyDino_lastBackup",now);setLastBackup(now);};

  // ---- SAVE: LOCAL ----
  const saveLocalCSV=()=>{
    const csv=buildCombinedCSV();
    const ts=new Date().toISOString().slice(0,10);
    const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download=`happy-dino-export-${ts}.csv`;a.click();
    markBackedUp();
    logAction(actor.role,actor.name,"EXPORT_CSV","Combined CSV downloaded locally");
  };
  const saveLocalJSON=()=>{
    const data=JSON.stringify(getDB(),null,2);
    const ts=new Date().toISOString().slice(0,10);
    const a=document.createElement("a");a.href="data:application/json;charset=utf-8,"+encodeURIComponent(data);a.download=`happy-dino-backup-${ts}.json`;a.click();
    markBackedUp();
    logAction(actor.role,actor.name,"EXPORT_JSON","Full JSON backup downloaded locally");
  };

  // ---- LOAD: LOCAL ----
  const loadLocalJSON=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        saveDB(JSON.parse(ev.target.result));
        refresh();
        logAction(actor.role,actor.name,"IMPORT_DATA","Restored from local JSON backup");
        alert("Data restored successfully from local file!");
        e.target.value="";
      }catch{alert("Invalid backup file — please choose a valid Happy Dino JSON backup.");}
    };
    reader.readAsText(file);
  };

  // ---- SAVE: GOOGLE DRIVE ----
  const saveToDriveJSON=async()=>{
    setDriveBusy(true);setDriveStatus("Connecting to Google Drive...");
    const data=JSON.stringify(getDB(),null,2);
    const ts=new Date().toISOString().slice(0,10);
    const res=await drive.uploadToDrive(`happy-dino-backup-${ts}.json`,data,"application/json");
    if(res.ok){setDriveStatus(`✓ Saved "happy-dino-backup-${ts}.json" to Google Drive successfully!`);markBackedUp();logAction(actor.role,actor.name,"DRIVE_SAVE_JSON","Backup saved to Drive");}
    else{setDriveStatus("⚠ "+(res.reason||"Drive save failed for an unknown reason."));}
    setDriveBusy(false);
  };
  const saveToDriveCSV=async()=>{
    setDriveBusy(true);setDriveStatus("Connecting to Google Drive...");
    const csv=buildCombinedCSV();
    const ts=new Date().toISOString().slice(0,10);
    const res=await drive.uploadToDrive(`happy-dino-export-${ts}.csv`,csv,"text/csv");
    if(res.ok){setDriveStatus(`✓ Saved "happy-dino-export-${ts}.csv" to Google Drive successfully!`);markBackedUp();logAction(actor.role,actor.name,"DRIVE_SAVE_CSV","CSV export saved to Drive");}
    else{setDriveStatus("⚠ "+(res.reason||"Drive save failed for an unknown reason."));}
    setDriveBusy(false);
  };

  // ---- LOAD: GOOGLE DRIVE ----
  const browseDriveFiles=async()=>{
    setShowDriveFiles(true);setDriveFilesLoading(true);setDriveStatus("");
    const res=await drive.listDriveFiles();
    if(res.ok){setDriveFiles(res.files.filter(f=>f.name.endsWith(".json")));}
    else{setDriveStatus("⚠ "+(res.reason||"Could not list Drive files."));setShowDriveFiles(false);}
    setDriveFilesLoading(false);
  };
  const restoreFromDriveFile=async(file)=>{
    if(!window.confirm(`Restore from "${file.name}"? This will overwrite all current data.`))return;
    setDriveBusy(true);setDriveStatus(`Downloading "${file.name}"...`);
    const res=await drive.downloadDriveFile(file.id);
    if(res.ok){
      try{
        saveDB(JSON.parse(res.content));
        refresh();
        setDriveStatus(`✓ Restored from "${file.name}" successfully!`);
        logAction(actor.role,actor.name,"DRIVE_RESTORE",`Restored from Drive file: ${file.name}`);
        setShowDriveFiles(false);
      }catch{setDriveStatus("⚠ That file isn't a valid Happy Dino JSON backup.");}
    }else{setDriveStatus("⚠ "+(res.reason||"Could not download that file."));}
    setDriveBusy(false);
  };

  const counts=Object.fromEntries(["schools","students","campTypes","sessions","registrations","crew","crewAssignments","payments","expenses","inventory","communications"].map(k=>[k,(db[k]||[]).length]));

  return <div>
    <PageHeader crumbs={[{label:"Dashboard",nav:onHome},"Backup & Restore"]} onHome={onHome} title="Backup & Restore"/>
    {lastBackup&&<div style={{background:"#dcfce7",border:"1px solid #bbf7d0",borderRadius:10,padding:"10px 14px",marginBottom:18,fontSize:13,color:"#16a34a"}}>✓ Last backup: <b>{fmtDate(lastBackup)}</b></div>}
    {!lastBackup&&<div style={{background:"#fef3c7",border:"1px solid #fde68a",borderRadius:10,padding:"10px 14px",marginBottom:18,fontSize:13,color:"#d97706"}}>⚠ No backup recorded yet. Export your data regularly to avoid loss.</div>}

    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:8,marginBottom:24}}>
      {Object.entries({Schools:counts.schools,Students:counts.students,"Camp Types":counts.campTypes,Sessions:counts.sessions,Registrations:counts.registrations,Payments:counts.payments,Crew:counts.crew,Expenses:counts.expenses,Inventory:counts.inventory}).map(([k,v])=><div key={k} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
        <div style={{fontSize:20,fontWeight:800,color:"var(--accent)"}}>{v}</div>
        <div style={{fontSize:11,color:"var(--muted)",fontWeight:600}}>{k}</div>
      </div>)}
    </div>

    {/* ===== SAVE SECTION ===== */}
    <SectionHeader label="💾 Save Backup"/>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:14,marginBottom:24}}>
      <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:12,padding:18}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:4,display:"flex",alignItems:"center",gap:6}}>🖥️ Save to This Device</div>
        <div style={{fontSize:12,color:"var(--muted)",marginBottom:14}}>Downloads a file to your computer or phone's Downloads folder.</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button onClick={saveLocalCSV} style={btn("primary")}>⬇ CSV (Excel)</button>
          <button onClick={saveLocalJSON} style={btn("ghost")}>⬇ JSON (Full)</button>
        </div>
      </div>
      <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:12,padding:18}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:4,display:"flex",alignItems:"center",gap:6}}>☁️ Save to Google Drive {drive.account&&<Badge label={drive.account} color="green"/>}</div>
        <div style={{fontSize:12,color:"var(--muted)",marginBottom:14}}>Saves directly into your team's shared Drive folder. First use will ask you to sign in.</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button onClick={saveToDriveCSV} disabled={driveBusy} style={{...btn("blue"),opacity:driveBusy?0.6:1}}>☁ CSV to Drive</button>
          <button onClick={saveToDriveJSON} disabled={driveBusy} style={{...btn("blue"),opacity:driveBusy?0.6:1}}>☁ JSON to Drive</button>
        </div>
      </div>
    </div>

    {/* ===== LOAD / RESTORE SECTION ===== */}
    <SectionHeader label="⬆ Load / Restore Backup"/>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:14,marginBottom:16}}>
      <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:12,padding:18}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:4,display:"flex",alignItems:"center",gap:6}}>🖥️ Restore from This Device</div>
        <div style={{fontSize:12,color:"var(--muted)",marginBottom:14}}><b style={{color:"#ef4444"}}>Warning:</b> overwrites all current data with the file you choose.</div>
        <label style={{...btn("danger"),display:"inline-block",cursor:"pointer"}}>⬆ Choose JSON File <input type="file" accept=".json" style={{display:"none"}} onChange={loadLocalJSON}/></label>
      </div>
      <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:12,padding:18}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:4,display:"flex",alignItems:"center",gap:6}}>☁️ Restore from Google Drive</div>
        <div style={{fontSize:12,color:"var(--muted)",marginBottom:14}}>Browse and restore from a backup previously saved to Drive.</div>
        <button onClick={browseDriveFiles} disabled={driveBusy} style={{...btn("blue"),opacity:driveBusy?0.6:1}}>☁ Browse Drive Backups</button>
      </div>
    </div>

    {showDriveFiles&&<div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:12,padding:16,marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontWeight:700,fontSize:13}}>Backups found in Drive folder</div>
        <button onClick={()=>setShowDriveFiles(false)} style={{...btn("ghost"),padding:"4px 10px",fontSize:11}}>Close</button>
      </div>
      {driveFilesLoading?<div style={{fontSize:12,color:"var(--muted)"}}>Loading...</div>:
        driveFiles.length===0?<div style={{fontSize:12,color:"var(--muted)"}}>No JSON backup files found in the Drive folder yet.</div>:
        <div style={{display:"grid",gap:6}}>
          {driveFiles.map(f=><div key={f.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8,padding:"8px 12px",background:"var(--surface2)",borderRadius:8}}>
            <div>
              <div style={{fontSize:12,fontWeight:600}}>{f.name}</div>
              <div style={{fontSize:11,color:"var(--muted)"}}>Modified: {fmtDateTime(f.modifiedTime)}</div>
            </div>
            <button onClick={()=>restoreFromDriveFile(f)} disabled={driveBusy} style={{...btn("danger"),fontSize:11,padding:"4px 10px"}}>Restore this</button>
          </div>)}
        </div>}
    </div>}

    {driveStatus&&<div style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 14px",fontSize:12,color:"var(--text)",marginBottom:16}}>{driveStatus}</div>}

    <div style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:10,padding:"12px 16px",fontSize:11,color:"var(--muted)"}}>
      ℹ️ Google Drive save/load requires this app to be hosted online (e.g. GitHub Pages) with your domain authorized in Google Cloud Console. It will not work when opening this file directly from your computer. If a sign-in popup doesn't appear, check that your browser isn't blocking popups for this site.
    </div>
  </div>;
}

// ── MANAGE USERS (Admin only) ──
function ManageUsers({db,refresh,actor,onHome}){
  const [showModal,setShowModal]=useState(false);
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({});
  const [err,setErr]=useState("");
  const users=db.users||[];

  const openAdd=()=>{setForm({id:uid(),name:"",loginId:"",password:"",role:"user"});setEditing(null);setErr("");setShowModal(true);};
  const openEdit=(u)=>{setForm({...u});setEditing(u.id);setErr("");setShowModal(true);};

  const save=()=>{
    const cleanId=(form.loginId||"").trim().toLowerCase();
    if(!form.name?.trim()){setErr("Name is required.");return;}
    if(!cleanId){setErr("Login ID is required.");return;}
    if(!form.password){setErr("Password is required.");return;}
    const dup=users.find(u=>u.loginId?.toLowerCase()===cleanId&&u.id!==form.id);
    if(dup){setErr("That Login ID is already taken.");return;}
    const record={...form,loginId:cleanId};
    const list=editing?users.map(u=>u.id===editing?record:u):[...users,record];
    setDB({users:list});
    logAction(actor.role,actor.name,editing?"EDIT_USER":"ADD_USER",`${record.name} (${record.loginId}, ${record.role})`);
    refresh();setShowModal(false);
  };

  const del=(u)=>{
    const adminCount=users.filter(x=>x.role==="admin").length;
    if(u.role==="admin"&&adminCount<=1){alert("Cannot delete the last remaining Admin account.");return;}
    if(u.id===actor.id){alert("You cannot delete the account you're currently logged in as.");return;}
    if(window.confirm(`Delete user "${u.name}"?`)){
      setDB({users:users.filter(x=>x.id!==u.id)});
      logAction(actor.role,actor.name,"DELETE_USER",`${u.name} (${u.loginId})`);
      refresh();
    }
  };

  return <div>
    <PageHeader crumbs={[{label:"Dashboard",nav:onHome},"Manage Users"]} onHome={onHome} title="Manage Users" action={<button onClick={openAdd} style={btn("primary")}>+ Add User</button>}/>
    <div style={{fontSize:12,color:"var(--muted)",marginTop:-12,marginBottom:14}}>Each user logs in with their own Login ID and Password. Actions they take are recorded under their name in the Audit Log.</div>
    <div style={{display:"grid",gap:10}}>
      {users.map(u=>{
        const actionCount=(db.auditLog||[]).filter(a=>a.name===u.name).length;
        return <div key={u.id} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:12,padding:"14px 16px"}}>
          <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8,alignItems:"center"}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{fontWeight:700,fontSize:14}}>{u.name}</div>
                <RoleBadge role={u.role}/>
                {u.id===actor.id&&<Badge label="You" color="blue"/>}
              </div>
              <div style={{fontSize:12,color:"var(--muted)",marginTop:2}}>Login ID: <b>{u.loginId}</b> · {actionCount} logged action{actionCount===1?"":"s"}</div>
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"flex-start"}}>
              <button onClick={()=>openEdit(u)} style={btn("ghost")}>Edit</button>
              <button onClick={()=>del(u)} style={btn("danger")}>Del</button>
            </div>
          </div>
        </div>;
      })}
    </div>
    {showModal&&<Modal title={editing?"Edit User":"Add User"} onClose={()=>setShowModal(false)}>
      <Field label="Full Name"><input style={inp} value={form.name||""} onChange={e=>setForm({...form,name:e.target.value})}/></Field>
      <Field label="Login ID" hint="Used to log in, e.g. ali.hassan — not case-sensitive">
        <input style={inp} value={form.loginId||""} onChange={e=>setForm({...form,loginId:e.target.value})} autoCapitalize="none" autoCorrect="off"/>
      </Field>
      <Field label="Password" hint={editing?"Leave unchanged or type a new password to reset it":""}>
        <input style={inp} value={form.password||""} onChange={e=>setForm({...form,password:e.target.value})}/>
      </Field>
      <Field label="Role">
        <select style={inp} value={form.role||"user"} onChange={e=>setForm({...form,role:e.target.value})}>
          <option value="admin">Admin — full access</option>
          <option value="finance">Finance — payments, reports, backup</option>
          <option value="user">User — data entry, no revenue view</option>
        </select>
      </Field>
      {err&&<div style={{color:"#ef4444",fontSize:12,marginBottom:10}}>{err}</div>}
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button onClick={()=>setShowModal(false)} style={btn("ghost")}>Cancel</button>
        <button onClick={save} style={btn("primary")}>Save</button>
      </div>
    </Modal>}
  </div>;
}

// ── MAIN APP ──
const MENU=[
  {key:"dashboard",label:"Dashboard",icon:"🏠",roles:["admin","finance","user"]},
  {key:"schools",label:"Schools",icon:"🏫",roles:["admin","user"]},
  {key:"students",label:"All Students",icon:"🎒",roles:["admin","user"]},
  {key:"campTypes",label:"Camp Types",icon:"🦖",roles:["admin","user"]},
  {key:"sessions",label:"Sessions",icon:"📅",roles:["admin","user"]},
  {key:"crew",label:"Crew",icon:"👥",roles:["admin","user"]},
  {key:"inventory",label:"Inventory",icon:"📦",roles:["admin","user"]},
  {key:"payments",label:"Payments",icon:"💳",roles:["admin","finance","user"]},
  {key:"reports",label:"Reports",icon:"📊",roles:["admin","finance"]},
  {key:"communications",label:"Communications",icon:"💬",roles:["admin"]},
  {key:"backup",label:"Backup & Restore",icon:"📁",roles:["admin","finance"]},
  {key:"auditlog",label:"Audit Log",icon:"📜",roles:["admin"]},
  {key:"settings",label:"Settings",icon:"⚙️",roles:["admin"]},
  {key:"manageUsers",label:"Manage Users",icon:"🔐",roles:["admin"]},
];

function App(){
  const {user,login,logout}=useAuth();
  const [page,setPage]=useState("dashboard");
  const [pageFilter,setPageFilter]=useState(null);
  const [db,setDbState]=useState(getDB);
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const refresh=useCallback(()=>setDbState({...getDB()}),[]);

  useEffect(()=>{if(!localStorage.getItem(DB_KEY))saveDB(initialDB);refresh();},[]);

  if(!user)return <LoginScreen onLogin={login}/>;

  const canAccess=(key)=>{const m=MENU.find(m=>m.key===key);return m?.roles.includes(user.role)||false;};
  const navigate=(key,filter)=>{if(canAccess(key)){setPage(key);setPageFilter(filter||null);setSidebarOpen(false);}};
  const goBackToDashboard=()=>navigate("dashboard");

  return <div style={{display:"flex",minHeight:"100vh"}}>
    {sidebarOpen&&<div onClick={()=>setSidebarOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:90}}/>}
    {/* Sidebar */}
    <div style={{width:215,background:"var(--surface)",borderRight:"1px solid var(--border)",display:"flex",flexDirection:"column",position:"fixed",top:0,left:0,height:"100vh",zIndex:100,transform:sidebarOpen?"translateX(0)":"translateX(-100%)",transition:"transform 0.2s ease"}}>
      <div style={{padding:"18px 14px 14px",borderBottom:"1px solid var(--border)"}}>
        <div style={{fontSize:16,fontWeight:800,color:"var(--accent)",fontFamily:"Georgia,serif"}}>🦕 Happy Dino</div>
        <div style={{fontSize:10,color:"var(--muted)",marginTop:2}}>Xperience Camp</div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"6px 0"}}>
        {MENU.filter(m=>m.roles.includes(user.role)).map(m=><button key={m.key} onClick={()=>navigate(m.key)} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"9px 14px",border:"none",background:page===m.key?"var(--surface2)":"transparent",cursor:"pointer",fontSize:13,fontWeight:page===m.key?700:400,color:page===m.key?"var(--accent)":"var(--text)",textAlign:"left",borderLeft:`3px solid ${page===m.key?"var(--accent)":"transparent"}`}}>
          <span>{m.icon}</span>{m.label}
        </button>)}
      </div>
      <div style={{padding:"12px 14px",borderTop:"1px solid var(--border)"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
          <span style={{fontSize:12,fontWeight:600}}>{user.name}</span>
          <RoleBadge role={user.role}/>
        </div>
        <button onClick={logout} style={{...btn("danger"),width:"100%",padding:"8px 12px",fontSize:12}}>🚪 Logout</button>
        <div style={{fontSize:9,color:"var(--muted)",marginTop:8,textAlign:"center"}}>{APP_VERSION}</div>
      </div>
    </div>
    {/* Main */}
    <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:"100vh"}}>
      <div style={{background:"var(--surface)",borderBottom:"1px solid var(--border)",padding:"10px 16px",display:"flex",alignItems:"center",gap:10,position:"sticky",top:0,zIndex:50,flexWrap:"wrap"}}>
        <button onClick={()=>setSidebarOpen(!sidebarOpen)} style={{background:"none",border:"none",cursor:"pointer",fontSize:22,color:"var(--text)",padding:"2px 6px",lineHeight:1}}>☰</button>
        <span style={{fontWeight:700,fontSize:15}}>{MENU.find(m=>m.key===page)?.label}</span>
        {(user.role==="admin")&&<GlobalSearch db={db} onResultClick={navigate}/>}
        <div style={{flex:1}}/>
        <RoleBadge role={user.role}/>
      </div>
      <div style={{flex:1,padding:"20px 16px",maxWidth:960,width:"100%",margin:"0 auto"}}>
        {page==="dashboard"&&<Dashboard db={db} navigate={navigate} role={user.role}/>}
        {page==="schools"&&<Schools db={db} refresh={refresh} actor={user} onHome={goBackToDashboard}/>}
        {page==="students"&&<Students db={db} refresh={refresh} onHome={goBackToDashboard} actor={user}/>}
        {page==="campTypes"&&<CampTypes db={db} refresh={refresh} actor={user} onHome={goBackToDashboard}/>}
        {page==="sessions"&&<Sessions db={db} refresh={refresh} initialFilter={pageFilter} actor={user} onHome={goBackToDashboard}/>}
        {page==="crew"&&<Crew db={db} refresh={refresh} actor={user} onHome={goBackToDashboard}/>}
        {page==="inventory"&&<Inventory db={db} refresh={refresh} actor={user} onHome={goBackToDashboard}/>}
        {page==="payments"&&<Payments db={db} refresh={refresh} initialFilter={pageFilter} role={user.role} actor={user} onHome={goBackToDashboard}/>}
        {page==="reports"&&<Reports db={db} onHome={goBackToDashboard}/>}
        {page==="communications"&&<Communications db={db} refresh={refresh} onHome={goBackToDashboard}/>}
        {page==="backup"&&<BackupRestore db={db} refresh={refresh} actor={user} onHome={goBackToDashboard}/>}
        {page==="auditlog"&&<AuditLog db={db} onHome={goBackToDashboard}/>}
        {page==="settings"&&<Settings db={db} refresh={refresh} onHome={goBackToDashboard}/>}
        {page==="manageUsers"&&<ManageUsers db={db} refresh={refresh} actor={user} onHome={goBackToDashboard}/>}
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
